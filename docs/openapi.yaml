paths:
  /auth/login:
    post:
      summary: Create a demo session from form credentials.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "303":
          description: Redirects to `/classes` and sets session cookies.
  /auth/logout:
    post:
      summary: Clear the current demo session.
      responses:
        "303":
          description: Redirects to `/login` and clears session cookies.
  /me:
    get:
      summary: Current authenticated user and active workspace.
      responses:
        "200":
          description: Current user.
        "401":
          description: Unauthenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /workspaces:
    get:
      summary: List workspaces available to the current user.
      responses:
        "200":
          description: Workspace list.
  /workspaces/select:
    post:
      summary: Select active workspace.
      responses:
        "200":
          description: Active workspace selected.
        "403":
          description: User is not a member of workspace.
  /settings:
    get:
      summary: Current account settings for the active membership.
      responses:
        "200":
          description: Account settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSettingsResponse"
        "401":
          description: Unauthenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing account settings permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      summary: Update account preferences for the active membership.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountSettings"
      responses:
        "200":
          description: Updated account settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSettingsResponse"
        "400":
          description: Invalid account settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing account settings permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /teacher/dashboard:
    get:
      summary: Aggregated teacher dashboard for the active workspace.
      responses:
        "200":
          description: Teacher dashboard summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherDashboardResponse"
        "401":
          description: Unauthenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing dashboard permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /ai/conversations:
    get:
      summary: Ask Pal assistant workspace for the active membership.
      responses:
        "200":
          description: Tenant-scoped assistant conversations, context, sources, and usage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantWorkspaceResponse"
        "401":
          description: Unauthenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing AI permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /ai/proposals:
    post:
      summary: Create a demo Ask Pal proposal from a prompt and selected sources.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssistantProposal"
      responses:
        "201":
          description: Demo assistant proposal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantProposal"
        "400":
          description: Invalid prompt or source payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing AI permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /teacher/classes:
    get:
      summary: List classes assigned to the authenticated teacher.
      parameters:
        - in: query
          name: academicYearId
          schema:
            type: string
        - in: query
          name: termId
          schema:
            type: string
      responses:
        "200":
          description: Assigned classes.
        "401":
          description: Unauthenticated.
        "403":
          description: Missing class permission.
  /teacher/tasks:
    get:
      summary: List task queue items visible to the authenticated teacher.
      responses:
        "200":
          description: Task queue items.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherTasksResponse"
        "401":
          description: Unauthenticated.
        "403":
          description: Missing task permission.
  /help:
    get:
      summary: List support guides and visible support requests.
      responses:
        "200":
          description: Help centre data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HelpCentreResponse"
        "401":
          description: Unauthenticated.
        "403":
          description: Missing support permission.
  /help/requests:
    post:
      summary: Open a support request in the active workspace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupportRequest"
      responses:
        "201":
          description: Created support request.
        "400":
          description: Invalid support request.
        "401":
          description: Unauthenticated.
        "403":
          description: Missing support request permission.
  /teacher/attendance:
    get:
      summary: List attendance registers for accessible classes.
      responses:
        "200":
          description: Attendance register summaries.
        "401":
          description: Unauthenticated.
        "403":
          description: Missing attendance permission.
  /teacher/lesson-plans:
    get:
      summary: List lesson plans for accessible classes.
      responses:
        "200":
          description: Lesson plan summaries.
        "401":
          description: Unauthenticated.
        "403":
          description: Missing lesson permission.
  /teacher/assessments:
    get:
      summary: List assessments for accessible classes.
      responses:
        "200":
          description: Assessment summaries.
        "401":
          description: Unauthenticated.
        "403":
          description: Missing assessment permission.
  /teacher/questions:
