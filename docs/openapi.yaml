openapi: 3.1.0
info:
  title: Prep Pal API
  version: 0.1.0
  description: Initial stable API contract for Prep Pal integration.
servers:
  - url: /api/v1
security:
  - cookieSession: []
components:
  securitySchemes:
    cookieSession:
      type: apiKey
      in: cookie
      name: prep_pal_session
  schemas:
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code:
              type: string
            message:
              type: string
            requestId:
              type: string
            fields:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
    UserProfile:
      type: object
      required: [id, email, displayName]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
    Workspace:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
    InterfaceDensity:
      type: string
      enum: [comfortable, compact]
    AiConfirmationMode:
      type: string
      enum: [always, high_impact, manual]
    AccountWorkspace:
      type: object
      required: [id, name, roleName, jobTitle, academicYearName, termName, isActive]
      properties:
        id:
          type: string
        name:
          type: string
        roleName:
          type: string
        jobTitle:
          type: string
        academicYearName:
          type: string
        termName:
          type: string
        isActive:
          type: boolean
    AccountPreferences:
      type: object
      required: [emailNotifications, inAppNotifications, dueDateReminders, supportUpdates, weeklyDigest, density, highContrast, language, timezone, aiConfirmationMode, aiSourceAccess, updatedAt]
      properties:
        emailNotifications:
          type: boolean
        inAppNotifications:
          type: boolean
        dueDateReminders:
          type: boolean
        supportUpdates:
          type: boolean
        weeklyDigest:
          type: boolean
        density:
          $ref: "#/components/schemas/InterfaceDensity"
        highContrast:
          type: boolean
        language:
          type: string
        timezone:
          type: string
        aiConfirmationMode:
          $ref: "#/components/schemas/AiConfirmationMode"
        aiSourceAccess:
          type: boolean
        updatedAt:
          type: string
          format: date-time
    AccountSecurity:
      type: object
      required: [activeSessionCount, passwordUpdatedAt]
      properties:
        activeSessionCount:
          type: integer
        passwordUpdatedAt:
          type: string
          format: date-time
    AccountAiUsage:
      type: object
      required: [promptsUsed, promptLimit, usagePercent]
      properties:
        promptsUsed:
          type: integer
        promptLimit:
          type: integer
        usagePercent:
          type: integer
    AccountSettingsResponse:
      type: object
      required: [user, activeWorkspace, workspaces, permissions, preferences, security, aiUsage]
      properties:
        user:
          type: object
          required: [id, displayName, shortName, email]
          properties:
            id:
              type: string
            displayName:
              type: string
            shortName:
              type: string
            email:
              type: string
              format: email
        activeWorkspace:
          $ref: "#/components/schemas/AccountWorkspace"
        workspaces:
          type: array
          items:
            $ref: "#/components/schemas/AccountWorkspace"
        permissions:
          type: object
          required: [canManageAccount, canSwitchWorkspace, canUseAi]
          properties:
            canManageAccount:
              type: boolean
            canSwitchWorkspace:
              type: boolean
            canUseAi:
              type: boolean
        preferences:
          $ref: "#/components/schemas/AccountPreferences"
        security:
          $ref: "#/components/schemas/AccountSecurity"
        aiUsage:
          $ref: "#/components/schemas/AccountAiUsage"
    UpdateAccountSettings:
      type: object
      required: [emailNotifications, inAppNotifications, dueDateReminders, supportUpdates, weeklyDigest, density, highContrast, language, timezone, aiConfirmationMode, aiSourceAccess]
      properties:
        emailNotifications:
          type: boolean
        inAppNotifications:
          type: boolean
        dueDateReminders:
          type: boolean
        supportUpdates:
          type: boolean
        weeklyDigest:
          type: boolean
        density:
          $ref: "#/components/schemas/InterfaceDensity"
        highContrast:
          type: boolean
        language:
          type: string
        timezone:
          type: string
        aiConfirmationMode:
          $ref: "#/components/schemas/AiConfirmationMode"
        aiSourceAccess:
          type: boolean
    DashboardTone:
      type: string
      enum: [primary, review, approved, changes, neutral, ai]
    DashboardMetric:
      type: object
      required: [id, label, value, detail, icon, tone]
      properties:
        id:
          type: string
        label:
          type: string
        value:
          type: string
        detail:
          type: string
        icon:
          type: string
        tone:
          $ref: "#/components/schemas/DashboardTone"
    DashboardAction:
      type: object
      required: [id, label, detail, href, icon, variant]
      properties:
        id:
          type: string
        label:
          type: string
        detail:
          type: string
        href:
          type: string
        icon:
          type: string
        variant:
          type: string
          enum: [primary, ai, secondary]
    DashboardScheduleItem:
      type: object
      required: [id, title, detail, timeLabel, location, icon, variant]
      properties:
        id:
          type: string
        title:
          type: string
        detail:
          type: string
        timeLabel:
          type: string
        location:
          type: string
        href:
          type: string
        icon:
          type: string
        variant:
          type: string
          enum: [default, current, break]
    DashboardTask:
      type: object
      required: [id, title, detail, href, priorityLabel, tone]
      properties:
        id:
          type: string
        title:
          type: string
        detail:
          type: string
        href:
          type: string
        priorityLabel:
          type: string
        tone:
          $ref: "#/components/schemas/DashboardTone"
        sourceLabel:
          type: string
    DashboardClassProgress:
      type: object
      required: [id, title, href, subject, learnerCount, readinessPercent, curriculumProgressPercent, attentionCount]
      properties:
        id:
          type: string
        title:
          type: string
        href:
          type: string
        subject:
          type: string
        learnerCount:
          type: integer
        readinessPercent:
          type: integer
        curriculumProgressPercent:
          type: integer
        attentionCount:
          type: integer
    DashboardRecentWork:
      type: object
      required: [id, title, detail, href, icon, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        detail:
          type: string
        href:
          type: string
        icon:
          type: string
        updatedAt:
          type: string
          format: date-time
    DashboardInsight:
      type: object
      required: [message, actionLabel, href]
      properties:
        message:
          type: string
        actionLabel:
          type: string
        href:
          type: string
    TeacherDashboardResponse:
      type: object
      required: [workspace, user, today, generatedAt, permissions, metrics, actions, schedule, urgentTasks, classProgress, recentWork, insight]
      properties:
        workspace:
          type: object
        user:
          type: object
          required: [id, displayName, shortName, email]
          properties:
            id:
              type: string
            displayName:
              type: string
            shortName:
              type: string
            email:
              type: string
              format: email
        today:
          type: string
          format: date
        generatedAt:
          type: string
          format: date-time
        permissions:
          type: object
          required: [canUseAi, canCreateAssessment, canCreateLessonPlan, canViewTasks, canViewSupport]
          properties:
            canUseAi:
              type: boolean
            canCreateAssessment:
              type: boolean
            canCreateLessonPlan:
              type: boolean
            canViewTasks:
              type: boolean
            canViewSupport:
              type: boolean
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/DashboardMetric"
        actions:
          type: array
          items:
            $ref: "#/components/schemas/DashboardAction"
        nextEvent:
          $ref: "#/components/schemas/DashboardScheduleItem"
        schedule:
          type: array
          items:
            $ref: "#/components/schemas/DashboardScheduleItem"
        urgentTasks:
          type: array
          items:
            $ref: "#/components/schemas/DashboardTask"
        classProgress:
          type: array
          items:
            $ref: "#/components/schemas/DashboardClassProgress"
        recentWork:
          type: array
          items:
            $ref: "#/components/schemas/DashboardRecentWork"
        insight:
          $ref: "#/components/schemas/DashboardInsight"
    AssistantConversation:
      type: object
      required: [id, title, summary, updatedAt, icon, active]
      properties:
        id:
          type: string
        title:
          type: string
        summary:
          type: string
        updatedAt:
          type: string
          format: date-time
        icon:
          type: string
        active:
          type: boolean
    AssistantMessage:
      type: object
      required: [id, role, body, createdAt, sourceIds]
      properties:
        id:
          type: string
        role:
          type: string
          enum: [assistant, user]
        body:
          type: string
        createdAt:
          type: string
          format: date-time
        sourceIds:
          type: array
          items:
            type: string
    AssistantQuickAction:
      type: object
      required: [id, title, description, icon, tone, prompt]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        icon:
          type: string
        tone:
          type: string
          enum: [ai, primary, neutral]
        prompt:
          type: string
    AssistantContextCard:
      type: object
      required: [id, label, value, detail, icon]
      properties:
        id:
          type: string
        label:
          type: string
        value:
          type: string
        detail:
          type: string
        icon:
          type: string
        href:
          type: string
    AssistantSource:
      type: object
      required: [id, title, type, detail, href, icon, tone, selected]
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
        detail:
          type: string
        href:
          type: string
        icon:
          type: string
        tone:
          type: string
          enum: [ai, primary, warning]
        selected:
          type: boolean
    AssistantUsage:
      type: object
      required: [used, limit, percent, resetLabel, confirmationMode, sourceAccessEnabled]
      properties:
        used:
          type: integer
        limit:
          type: integer
        percent:
          type: integer
        resetLabel:
          type: string
        confirmationMode:
          $ref: "#/components/schemas/AiConfirmationMode"
        sourceAccessEnabled:
          type: boolean
    AssistantSuggestedAction:
      type: object
      required: [id, label, detail, href, icon, kind, impact, status]
      properties:
        id:
          type: string
        label:
          type: string
        detail:
          type: string
        href:
          type: string
        icon:
          type: string
        kind:
          type: string
          enum: [open_link, draft_lesson, draft_assessment, create_task]
        impact:
          type: string
          enum: [low, medium, high]
        status:
          type: string
          enum: [needs_confirmation, queued, draft]
    AssistantAudit:
      type: object
      required: [id, provider, modelLabel, createdAt, confirmationMode, tenantScoped]
      properties:
        id:
          type: string
        provider:
          type: string
          enum: [demo-assistant]
        modelLabel:
          type: string
        createdAt:
          type: string
          format: date-time
        confirmationMode:
          $ref: "#/components/schemas/AiConfirmationMode"
        tenantScoped:
          type: boolean
    AssistantWorkspaceResponse:
      type: object
      required: [workspace, user, permissions, conversations, activeConversationId, messages, quickActions, context, activeTags, sources, usage, suggestedPrompt, disclaimer]
      properties:
        workspace:
          type: object
        user:
          type: object
          required: [id, displayName, shortName, email]
          properties:
            id:
              type: string
            displayName:
              type: string
            shortName:
              type: string
            email:
              type: string
              format: email
        permissions:
          type: object
          required: [canUseAi, canCreateLessonPlan, canCreateAssessment, canCreateTask]
          properties:
            canUseAi:
              type: boolean
            canCreateLessonPlan:
              type: boolean
            canCreateAssessment:
              type: boolean
            canCreateTask:
              type: boolean
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/AssistantConversation"
        activeConversationId:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AssistantMessage"
        quickActions:
          type: array
          items:
            $ref: "#/components/schemas/AssistantQuickAction"
        context:
          type: array
          items:
            $ref: "#/components/schemas/AssistantContextCard"
        activeTags:
          type: array
          items:
            type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/AssistantSource"
        usage:
          $ref: "#/components/schemas/AssistantUsage"
        suggestedPrompt:
          type: string
        disclaimer:
          type: string
    CreateAssistantProposal:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
          minLength: 3
          maxLength: 1000
        quickActionId:
          type: string
        sourceIds:
          type: array
          items:
            type: string
        contextTags:
          type: array
          items:
            type: string
    AssistantProposal:
      type: object
      required: [id, conversationId, userMessage, assistantMessage, suggestedActions, sourceIds, requiresConfirmation, audit]
      properties:
        id:
          type: string
        conversationId:
          type: string
        userMessage:
          $ref: "#/components/schemas/AssistantMessage"
        assistantMessage:
          $ref: "#/components/schemas/AssistantMessage"
        suggestedActions:
          type: array
          items:
            $ref: "#/components/schemas/AssistantSuggestedAction"
        sourceIds:
          type: array
          items:
            type: string
        requiresConfirmation:
          type: boolean
        audit:
          $ref: "#/components/schemas/AssistantAudit"
    TeacherClassListItem:
      type: object
      required: [id, displayName, subjectName, academicYearName, learnerCount]
      properties:
        id:
          type: string
        displayName:
          type: string
        subjectName:
          type: string
        academicYearName:
          type: string
        learnerCount:
          type: integer
        room:
          type: string
        nextLesson:
          type: string
    ClassOverview:
      type: object
      required: [id, displayName, subjectName, learners]
      properties:
        id:
          type: string
        displayName:
          type: string
        subjectName:
          type: string
        learners:
          type: array
          items:
            type: object
            required: [id, displayName]
            properties:
              id:
                type: string
              displayName:
                type: string
    TaskStatus:
      type: string
      enum: [open, in_progress, blocked, done]
    TaskPriority:
      type: string
      enum: [low, medium, high, urgent]
    TaskCategory:
      type: string
      enum: [lesson, assessment, grading, attendance, report, approval, resource, guardian_follow_up, admin]
    TaskActivity:
      type: object
      required: [id, authorName, authorRole, body, createdAt]
      properties:
        id:
          type: string
        authorName:
          type: string
        authorRole:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
    TeacherTask:
      type: object
      required: [id, workspaceId, ownerName, assignedName, title, description, status, priority, category, dueAt, createdAt, updatedAt, aiSuggested]
      properties:
        id:
          type: string
        workspaceId:
          type: string
        classId:
          type: string
        classDisplayName:
          type: string
        subjectName:
          type: string
        gradeName:
          type: string
        ownerName:
          type: string
        assignedName:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        category:
          $ref: "#/components/schemas/TaskCategory"
        dueAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        blockedReason:
          type: string
        sourceHref:
          type: string
        sourceLabel:
          type: string
        aiSuggested:
          type: boolean
    TaskDetail:
      allOf:
        - $ref: "#/components/schemas/TeacherTask"
        - type: object
          required: [workspace, permissions, activities]
          properties:
            workspace:
              type: object
            permissions:
              type: object
              required: [canManageTasks, canUseAi]
              properties:
                canManageTasks:
                  type: boolean
                canUseAi:
                  type: boolean
            classHref:
              type: string
            activities:
              type: array
              items:
                $ref: "#/components/schemas/TaskActivity"
    TeacherTasksResponse:
      type: object
      required: [workspace, permissions, tasks]
      properties:
        workspace:
          type: object
        permissions:
          type: object
          required: [canManageTasks, canUseAi]
          properties:
            canManageTasks:
              type: boolean
            canUseAi:
              type: boolean
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/TeacherTask"
    UpdateTaskStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/TaskStatus"
        note:
          type: string
    SupportGuideCategory:
      type: string
      enum: [getting_started, assessment, reports, ai, account, troubleshooting]
    SupportRequestStatus:
      type: string
      enum: [open, waiting_support, waiting_teacher, resolved]
    SupportRequestPriority:
      type: string
      enum: [low, medium, high]
    SupportGuide:
      type: object
      required: [id, title, summary, category, readMinutes, updatedAt, tags]
      properties:
        id:
          type: string
        title:
          type: string
        summary:
          type: string
        category:
          $ref: "#/components/schemas/SupportGuideCategory"
        readMinutes:
          type: integer
        updatedAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        href:
          type: string
    SupportRequest:
      type: object
      required: [id, workspaceId, title, summary, category, status, priority, createdByName, createdAt, updatedAt, messageCount]
      properties:
        id:
          type: string
        workspaceId:
          type: string
        title:
          type: string
        summary:
          type: string
        category:
          $ref: "#/components/schemas/SupportGuideCategory"
        status:
          $ref: "#/components/schemas/SupportRequestStatus"
        priority:
          $ref: "#/components/schemas/SupportRequestPriority"
        createdByName:
          type: string
        assignedSupportName:
          type: string
        sourceHref:
          type: string
        sourceLabel:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
        messageCount:
          type: integer
    SupportMessage:
      type: object
      required: [id, authorName, authorRole, body, createdAt]
      properties:
        id:
          type: string
        authorName:
          type: string
        authorRole:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
    SupportRequestDetail:
      allOf:
        - $ref: "#/components/schemas/SupportRequest"
        - type: object
          required: [workspace, permissions, messages]
          properties:
            workspace:
              type: object
            permissions:
              type: object
              required: [canAddMessage, canManageSupport, canUseAi]
              properties:
                canAddMessage:
                  type: boolean
                canManageSupport:
                  type: boolean
                canUseAi:
                  type: boolean
            messages:
              type: array
              items:
                $ref: "#/components/schemas/SupportMessage"
    HelpCentreResponse:
      type: object
      required: [workspace, permissions, guides, requests]
      properties:
        workspace:
          type: object
        permissions:
          type: object
          required: [canCreateSupportRequest, canManageSupport, canUseAi]
          properties:
            canCreateSupportRequest:
              type: boolean
            canManageSupport:
              type: boolean
            canUseAi:
              type: boolean
        guides:
          type: array
          items:
            $ref: "#/components/schemas/SupportGuide"
        requests:
          type: array
          items:
            $ref: "#/components/schemas/SupportRequest"
    CreateSupportRequest:
      type: object
      required: [title, summary, category, priority]
      properties:
        title:
          type: string
        summary:
          type: string
        category:
          $ref: "#/components/schemas/SupportGuideCategory"
        priority:
          $ref: "#/components/schemas/SupportRequestPriority"
        sourceHref:
          type: string
        sourceLabel:
          type: string
    AddSupportMessage:
      type: object
      required: [body]
      properties:
        body:
          type: string
        status:
          $ref: "#/components/schemas/SupportRequestStatus"
    AttendanceStatus:
      type: string
      enum: [present, absent, late, excused]
    AttendanceClassSummary:
      type: object
      required: [id, displayName, learnerCount, markedCount, status, counts]
      properties:
        id:
          type: string
        displayName:
          type: string
        learnerCount:
          type: integer
        markedCount:
          type: integer
        status:
          type: string
          enum: [complete, partial, pending]
        counts:
          type: object
          required: [present, absent, late, excused, pending]
          properties:
            present:
              type: integer
            absent:
              type: integer
            late:
              type: integer
            excused:
              type: integer
            pending:
              type: integer
    AttendanceRegister:
      allOf:
        - $ref: "#/components/schemas/AttendanceClassSummary"
        - type: object
          required: [learners]
          properties:
            learners:
              type: array
              items:
                type: object
                required: [learnerId, displayName, status, isMarked]
                properties:
                  learnerId:
                    type: string
                  displayName:
                    type: string
                  status:
                    $ref: "#/components/schemas/AttendanceStatus"
                  note:
                    type: string
                  isMarked:
                    type: boolean
    MarkAttendanceRequest:
      type: object
      required: [records]
      properties:
        date:
          type: string
          format: date
        records:
          type: array
          items:
            type: object
            required: [learnerId, status]
            properties:
              learnerId:
                type: string
              status:
                $ref: "#/components/schemas/AttendanceStatus"
              note:
                type: string
    LessonPlanStatus:
      type: string
      enum: [draft, in_review, approved]
    LessonPlanListItem:
      type: object
      required: [id, classId, title, topic, status, scheduledFor, durationMinutes]
      properties:
        id:
          type: string
        classId:
          type: string
        classDisplayName:
          type: string
        title:
          type: string
        topic:
          type: string
        status:
          $ref: "#/components/schemas/LessonPlanStatus"
        scheduledFor:
          type: string
          format: date
        durationMinutes:
          type: integer
        readinessPercent:
          type: integer
    LessonPlanDetail:
      allOf:
        - $ref: "#/components/schemas/LessonPlanListItem"
        - type: object
          required: [objectives, materials, starterActivity, teachingActivity, learnerPractice, assessmentCheck, differentiation]
          properties:
            objectives:
              type: array
              items:
                type: string
            materials:
              type: array
              items:
                type: string
            starterActivity:
              type: string
            teachingActivity:
              type: string
            learnerPractice:
              type: string
            assessmentCheck:
              type: string
            differentiation:
              type: string
    CreateLessonPlanRequest:
      type: object
      required: [classId, title, topic, scheduledFor, durationMinutes, objectives, teachingActivity, learnerPractice, assessmentCheck]
      properties:
        classId:
          type: string
        title:
          type: string
        topic:
          type: string
        scheduledFor:
          type: string
          format: date
