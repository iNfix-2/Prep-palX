openapi: 3.1.0
info:
  title: Prep Pal API
  version: 0.1.0
  description: Initial stable API contract for Prep Pal integration.
servers:
  - url: /api/v1
security:
  - cookieSession: []
components:
  securitySchemes:
    cookieSession:
      type: apiKey
      in: cookie
      name: prep_pal_session
  schemas:
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code:
              type: string
            message:
              type: string
            requestId:
              type: string
            fields:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
    UserProfile:
      type: object
      required: [id, email, displayName]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
    Workspace:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
    TeacherClassListItem:
      type: object
      required: [id, displayName, subjectName, academicYearName, learnerCount]
      properties:
        id:
          type: string
        displayName:
          type: string
        subjectName:
          type: string
        academicYearName:
          type: string
        learnerCount:
          type: integer
        room:
          type: string
        nextLesson:
          type: string
    ClassOverview:
      type: object
      required: [id, displayName, subjectName, learners]
      properties:
        id:
          type: string
        displayName:
          type: string
        subjectName:
          type: string
        learners:
          type: array
          items:
            type: object
            required: [id, displayName]
            properties:
              id:
                type: string
              displayName:
                type: string
    AttendanceStatus:
      type: string
      enum: [present, absent, late, excused]
    AttendanceClassSummary:
      type: object
      required: [id, displayName, learnerCount, markedCount, status, counts]
      properties:
        id:
          type: string
        displayName:
          type: string
        learnerCount:
          type: integer
        markedCount:
          type: integer
        status:
          type: string
          enum: [complete, partial, pending]
        counts:
          type: object
          required: [present, absent, late, excused, pending]
          properties:
            present:
              type: integer
            absent:
              type: integer
            late:
              type: integer
            excused:
              type: integer
            pending:
              type: integer
    AttendanceRegister:
      allOf:
        - $ref: "#/components/schemas/AttendanceClassSummary"
        - type: object
          required: [learners]
          properties:
            learners:
              type: array
              items:
                type: object
                required: [learnerId, displayName, status, isMarked]
                properties:
                  learnerId:
                    type: string
                  displayName:
                    type: string
                  status:
                    $ref: "#/components/schemas/AttendanceStatus"
                  note:
                    type: string
                  isMarked:
                    type: boolean
    MarkAttendanceRequest:
      type: object
      required: [records]
      properties:
        date:
          type: string
          format: date
        records:
          type: array
          items:
            type: object
            required: [learnerId, status]
            properties:
              learnerId:
                type: string
              status:
                $ref: "#/components/schemas/AttendanceStatus"
              note:
                type: string
    LessonPlanStatus:
      type: string
      enum: [draft, in_review, approved]
    LessonPlanListItem:
      type: object
      required: [id, classId, title, topic, status, scheduledFor, durationMinutes]
      properties:
        id:
          type: string
        classId:
          type: string
        classDisplayName:
          type: string
        title:
          type: string
        topic:
          type: string
        status:
          $ref: "#/components/schemas/LessonPlanStatus"
        scheduledFor:
          type: string
          format: date
        durationMinutes:
          type: integer
        readinessPercent:
          type: integer
    LessonPlanDetail:
      allOf:
        - $ref: "#/components/schemas/LessonPlanListItem"
        - type: object
          required: [objectives, materials, starterActivity, teachingActivity, learnerPractice, assessmentCheck, differentiation]
          properties:
            objectives:
              type: array
              items:
                type: string
            materials:
              type: array
              items:
                type: string
            starterActivity:
              type: string
            teachingActivity:
              type: string
            learnerPractice:
              type: string
            assessmentCheck:
              type: string
            differentiation:
              type: string
    CreateLessonPlanRequest:
      type: object
      required: [classId, title, topic, scheduledFor, durationMinutes, objectives, teachingActivity, learnerPractice, assessmentCheck]
      properties:
        classId:
          type: string
        title:
          type: string
        topic:
          type: string
        scheduledFor:
          type: string
          format: date
        durationMinutes:
          type: integer
        objectives:
          type: array
          items:
            type: string
        materials:
          type: array
          items:
            type: string
        starterActivity:
          type: string
        teachingActivity:
          type: string
        learnerPractice:
          type: string
        assessmentCheck:
          type: string
        differentiation:
          type: string
paths:
  /auth/login:
    post:
      summary: Create a demo session from form credentials.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "303":
          description: Redirects to `/classes` and sets session cookies.
  /auth/logout:
    post:
      summary: Clear the current demo session.
      responses:
        "303":
          description: Redirects to `/login` and clears session cookies.
  /me:
    get:
      summary: Current authenticated user and active workspace.
      responses:
        "200":
          description: Current user.
        "401":
          description: Unauthenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /workspaces:
    get:
      summary: List workspaces available to the current user.
      responses:
        "200":
          description: Workspace list.
  /workspaces/select:
    post:
      summary: Select active workspace.
      responses:
        "200":
          description: Active workspace selected.
        "403":
          description: User is not a member of workspace.
  /teacher/classes:
    get:
      summary: List classes assigned to the authenticated teacher.
      parameters:
        - in: query
          name: academicYearId
          schema:
            type: string
        - in: query
          name: termId
          schema:
            type: string
      responses:
        "200":
          description: Assigned classes.
        "401":
          description: Unauthenticated.
        "403":
          description: Missing class permission.
  /teacher/attendance:
    get:
      summary: List attendance registers for accessible classes.
      responses:
        "200":
          description: Attendance register summaries.
        "401":
          description: Unauthenticated.
        "403":
          description: Missing attendance permission.
  /teacher/lesson-plans:
    get:
      summary: List lesson plans for accessible classes.
      responses:
        "200":
          description: Lesson plan summaries.
        "401":
          description: Unauthenticated.
        "403":
          description: Missing lesson permission.
  /lesson-plans:
    post:
      summary: Create a lesson plan draft for an accessible class.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLessonPlanRequest"
      responses:
        "201":
          description: Created lesson plan.
        "400":
          description: Invalid lesson plan draft.
        "401":
          description: Unauthenticated.
        "403":
          description: Class is outside permitted scope or missing lesson permission.
  /classes/{classId}:
    get:
      summary: Get class overview if the user has access.
      parameters:
        - in: path
          name: classId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Class overview.
        "401":
          description: Unauthenticated.
        "403":
          description: Class is outside permitted scope.
        "404":
          description: Class not found in active tenant.
  /lesson-plans/{lessonPlanId}:
    get:
      summary: Get lesson plan detail if the user has access.
      parameters:
        - in: path
          name: lessonPlanId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lesson plan detail.
        "401":
          description: Unauthenticated.
        "403":
          description: Lesson plan is outside permitted class scope.
        "404":
          description: Lesson plan not found in active tenant.
  /classes/{classId}/attendance:
    get:
      summary: Get attendance register for an accessible class.
      parameters:
        - in: path
          name: classId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Attendance register.
        "401":
          description: Unauthenticated.
        "403":
          description: Class is outside permitted scope or missing attendance permission.
        "404":
          description: Class not found in active tenant.
    post:
      summary: Save attendance records for an accessible class.
      parameters:
        - in: path
          name: classId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkAttendanceRequest"
      responses:
        "200":
          description: Updated attendance register.
        "400":
          description: Invalid attendance records.
        "401":
          description: Unauthenticated.
        "403":
          description: Class is outside permitted scope or missing attendance permission.
        "404":
          description: Class not found in active tenant.
