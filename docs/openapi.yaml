openapi: 3.1.0
info:
  title: Prep Pal API
  version: 0.1.0
  description: Initial stable API contract for Prep Pal integration.
servers:
  - url: /api/v1
security:
  - cookieSession: []
components:
  securitySchemes:
    cookieSession:
      type: apiKey
      in: cookie
      name: prep_pal_session
  schemas:
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code:
              type: string
            message:
              type: string
            requestId:
              type: string
            fields:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
    UserProfile:
      type: object
      required: [id, email, displayName]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
    Workspace:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
    TeacherClassListItem:
      type: object
      required: [id, displayName, subjectName, academicYearName, learnerCount]
      properties:
        id:
          type: string
        displayName:
          type: string
        subjectName:
          type: string
        academicYearName:
          type: string
        learnerCount:
          type: integer
        room:
          type: string
        nextLesson:
          type: string
    ClassOverview:
      type: object
      required: [id, displayName, subjectName, learners]
      properties:
        id:
          type: string
        displayName:
          type: string
        subjectName:
          type: string
        learners:
          type: array
          items:
            type: object
            required: [id, displayName]
            properties:
              id:
                type: string
              displayName:
                type: string
    AttendanceStatus:
      type: string
      enum: [present, absent, late, excused]
    AttendanceClassSummary:
      type: object
      required: [id, displayName, learnerCount, markedCount, status, counts]
      properties:
        id:
          type: string
        displayName:
          type: string
        learnerCount:
          type: integer
        markedCount:
          type: integer
        status:
          type: string
          enum: [complete, partial, pending]
        counts:
          type: object
          required: [present, absent, late, excused, pending]
          properties:
            present:
              type: integer
            absent:
              type: integer
            late:
              type: integer
            excused:
              type: integer
            pending:
              type: integer
    AttendanceRegister:
      allOf:
        - $ref: "#/components/schemas/AttendanceClassSummary"
        - type: object
          required: [learners]
          properties:
            learners:
              type: array
              items:
                type: object
                required: [learnerId, displayName, status, isMarked]
                properties:
                  learnerId:
                    type: string
                  displayName:
                    type: string
                  status:
                    $ref: "#/components/schemas/AttendanceStatus"
                  note:
                    type: string
                  isMarked:
                    type: boolean
    MarkAttendanceRequest:
      type: object
      required: [records]
      properties:
        date:
          type: string
          format: date
        records:
          type: array
          items:
            type: object
            required: [learnerId, status]
            properties:
              learnerId:
                type: string
              status:
                $ref: "#/components/schemas/AttendanceStatus"
              note:
                type: string
    LessonPlanStatus:
      type: string
      enum: [draft, in_review, approved]
    LessonPlanListItem:
      type: object
      required: [id, classId, title, topic, status, scheduledFor, durationMinutes]
      properties:
        id:
          type: string
        classId:
          type: string
        classDisplayName:
          type: string
        title:
          type: string
        topic:
          type: string
        status:
          $ref: "#/components/schemas/LessonPlanStatus"
        scheduledFor:
          type: string
          format: date
        durationMinutes:
          type: integer
        readinessPercent:
          type: integer
    LessonPlanDetail:
      allOf:
        - $ref: "#/components/schemas/LessonPlanListItem"
        - type: object
          required: [objectives, materials, starterActivity, teachingActivity, learnerPractice, assessmentCheck, differentiation]
          properties:
            objectives:
              type: array
              items:
                type: string
            materials:
              type: array
              items:
                type: string
            starterActivity:
              type: string
            teachingActivity:
              type: string
            learnerPractice:
              type: string
            assessmentCheck:
              type: string
            differentiation:
              type: string
    CreateLessonPlanRequest:
      type: object
      required: [classId, title, topic, scheduledFor, durationMinutes, objectives, teachingActivity, learnerPractice, assessmentCheck]
      properties:
        classId:
          type: string
        title:
          type: string
        topic:
          type: string
        scheduledFor:
          type: string
          format: date
        durationMinutes:
          type: integer
        objectives:
          type: array
          items:
            type: string
        materials:
          type: array
          items:
            type: string
        starterActivity:
          type: string
        teachingActivity:
          type: string
        learnerPractice:
          type: string
        assessmentCheck:
          type: string
        differentiation:
          type: string
    AssessmentStatus:
      type: string
      enum: [draft, in_review, published]
    AssessmentType:
      type: string
      enum: [classwork, quiz, continuous_assessment, exam]
    AssessmentItem:
      type: object
      required: [id, prompt, marks, skill]
      properties:
        id:
          type: string
        prompt:
          type: string
        marks:
          type: integer
        skill:
          type: string
    AssessmentListItem:
      type: object
      required: [id, classId, title, type, status, scheduledFor, dueDate, totalMarks]
      properties:
        id:
          type: string
        classId:
          type: string
        classDisplayName:
          type: string
        title:
          type: string
        type:
          $ref: "#/components/schemas/AssessmentType"
        status:
          $ref: "#/components/schemas/AssessmentStatus"
        scheduledFor:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        durationMinutes:
          type: integer
        totalMarks:
          type: integer
        itemCount:
          type: integer
        readinessPercent:
          type: integer
    AssessmentDetail:
      allOf:
        - $ref: "#/components/schemas/AssessmentListItem"
        - type: object
          required: [topics, instructions, items, reviewNotes]
          properties:
            topics:
              type: array
              items:
                type: string
            instructions:
              type: string
            items:
              type: array
              items:
                $ref: "#/components/schemas/AssessmentItem"
            reviewNotes:
              type: string
    CreateAssessmentRequest:
      type: object
      required: [classId, title, type, scheduledFor, dueDate, durationMinutes, totalMarks, topics, instructions, items]
      properties:
        classId:
          type: string
        title:
          type: string
        type:
          $ref: "#/components/schemas/AssessmentType"
        scheduledFor:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        durationMinutes:
          type: integer
        totalMarks:
          type: integer
        topics:
          type: array
          items:
            type: string
        instructions:
          type: string
        items:
          type: array
          items:
            type: object
            required: [prompt, marks, skill]
            properties:
              prompt:
                type: string
              marks:
                type: integer
              skill:
                type: string
        reviewNotes:
          type: string
    GradebookSheetStatus:
      type: string
      enum: [complete, partial, not_started]
    GradebookScoreStatus:
      type: string
      enum: [scored, missing, excused]
    GradebookSheetSummary:
      type: object
      required: [id, assessmentId, classId, assessmentTitle, totalMarks, learnerCount, scoredCount, missingCount, status]
      properties:
        id:
          type: string
        assessmentId:
          type: string
        classId:
          type: string
        assessmentTitle:
          type: string
        classDisplayName:
          type: string
        subjectName:
          type: string
        dueDate:
          type: string
          format: date
        totalMarks:
          type: integer
        learnerCount:
          type: integer
        scoredCount:
          type: integer
        missingCount:
          type: integer
        averageScorePercent:
          type: integer
        status:
          $ref: "#/components/schemas/GradebookSheetStatus"
    GradebookSheet:
      allOf:
        - $ref: "#/components/schemas/GradebookSheetSummary"
        - type: object
          required: [topics, instructions, learners]
          properties:
            topics:
              type: array
              items:
                type: string
            instructions:
              type: string
            learners:
              type: array
              items:
                type: object
                required: [learnerId, displayName, maxScore, status]
                properties:
                  learnerId:
                    type: string
                  displayName:
                    type: string
                  admissionNo:
                    type: string
                  score:
                    type:
                      - number
                      - "null"
                  maxScore:
                    type: number
                  status:
                    $ref: "#/components/schemas/GradebookScoreStatus"
                  feedback:
                    type: string
    SaveGradebookScoresRequest:
      type: object
      required: [scores]
      properties:
        scores:
          type: array
          items:
            type: object
            required: [learnerId, status]
            properties:
              learnerId:
                type: string
              score:
                type:
                  - number
                  - "null"
              status:
                $ref: "#/components/schemas/GradebookScoreStatus"
              feedback:
                type: string
    ReportReadinessStatus:
      type: string
      enum: [ready, needs_attention, blocked]
    ReportCommentStatus:
      type: string
      enum: [draft, ready]
    ReportClassSummary:
      type: object
      required: [id, classId, classDisplayName, learnerCount, readyLearnerCount, missingCommentCount, missingScoreCount, readinessPercent, status]
      properties:
        id:
          type: string
        classId:
          type: string
        classDisplayName:
          type: string
        subjectName:
          type: string
        gradeName:
          type: string
        room:
          type: string
        learnerCount:
          type: integer
        readyLearnerCount:
          type: integer
        commentCount:
          type: integer
        missingCommentCount:
          type: integer
        missingScoreCount:
          type: integer
        averageScorePercent:
          type: integer
        averageAttendancePercent:
          type: integer
        readinessPercent:
          type: integer
        status:
          $ref: "#/components/schemas/ReportReadinessStatus"
    ReportLearnerProfile:
      type: object
      required: [learnerId, displayName, admissionNo, averageScorePercent, missingScoreCount, attendancePercent, comment, commentStatus, isReady]
      properties:
        learnerId:
          type: string
        displayName:
          type: string
        admissionNo:
          type: string
        averageScorePercent:
          type: integer
        missingScoreCount:
          type: integer
        attendancePercent:
          type: integer
        comment:
          type: string
        commentStatus:
          $ref: "#/components/schemas/ReportCommentStatus"
        isReady:
          type: boolean
    ClassReport:
      allOf:
        - $ref: "#/components/schemas/ReportClassSummary"
        - type: object
          required: [academicSessionLabel, currentUnit, learners]
          properties:
            academicSessionLabel:
              type: string
            currentUnit:
              type: string
            learners:
              type: array
              items:
                $ref: "#/components/schemas/ReportLearnerProfile"
    SaveReportCommentsRequest:
      type: object
      required: [comments]
      properties:
        comments:
          type: array
          items:
            type: object
            required: [learnerId, comment, status]
            properties:
              learnerId:
                type: string
              comment:
                type: string
              status:
                $ref: "#/components/schemas/ReportCommentStatus"
    ApprovalResourceType:
      type: string
      enum: [lesson_plan, assessment, report]
    ApprovalStatus:
      type: string
      enum: [pending, changes_requested, approved]
    ApprovalPriority:
      type: string
      enum: [low, medium, high]
    ApprovalNote:
      type: object
      required: [id, authorName, authorRole, body, createdAt]
      properties:
        id:
          type: string
        authorName:
          type: string
        authorRole:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
    ApprovalRequest:
      type: object
      required: [id, classId, classDisplayName, resourceType, resourceId, resourceHref, title, summary, status, priority, submittedByName, submittedAt, dueDate, updatedAt, noteCount]
      properties:
        id:
          type: string
        workspaceId:
          type: string
        classId:
          type: string
        classDisplayName:
          type: string
        subjectName:
          type: string
        gradeName:
          type: string
        resourceType:
          $ref: "#/components/schemas/ApprovalResourceType"
        resourceId:
          type: string
        resourceHref:
          type: string
        title:
          type: string
        summary:
          type: string
        status:
          $ref: "#/components/schemas/ApprovalStatus"
        priority:
          $ref: "#/components/schemas/ApprovalPriority"
        submittedByName:
          type: string
        reviewerName:
          type: string
        submittedAt:
          type: string
          format: date-time
        dueDate:
          type: string
          format: date
        updatedAt:
          type: string
          format: date-time
        noteCount:
          type: integer
    ApprovalRequestDetail:
      allOf:
        - $ref: "#/components/schemas/ApprovalRequest"
        - type: object
          required: [notes]
          properties:
            notes:
              type: array
              items:
                $ref: "#/components/schemas/ApprovalNote"
    SubmitApprovalDecisionRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [approve, request_changes]
        note:
          type: string
paths:
  /auth/login:
    post:
      summary: Create a demo session from form credentials.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "303":
          description: Redirects to `/classes` and sets session cookies.
  /auth/logout:
    post:
      summary: Clear the current demo session.
      responses:
        "303":
          description: Redirects to `/login` and clears session cookies.
  /me:
    get:
      summary: Current authenticated user and active workspace.
      responses:
        "200":
          description: Current user.
        "401":
          description: Unauthenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /workspaces:
    get:
      summary: List workspaces available to the current user.
      responses:
        "200":
          description: Workspace list.
  /workspaces/select:
    post:
      summary: Select active workspace.
      responses:
        "200":
          description: Active workspace selected.
        "403":
          description: User is not a member of workspace.
  /teacher/classes:
    get:
      summary: List classes assigned to the authenticated teacher.
      parameters:
        - in: query
          name: academicYearId
          schema:
            type: string
        - in: query
          name: termId
          schema:
            type: string
      responses:
        "200":
          description: Assigned classes.
        "401":
          description: Unauthenticated.
        "403":
          description: Missing class permission.
  /teacher/attendance:
    get:
      summary: List attendance registers for accessible classes.
      responses:
        "200":
          description: Attendance register summaries.
        "401":
          description: Unauthenticated.
        "403":
          description: Missing attendance permission.
  /teacher/lesson-plans:
    get:
      summary: List lesson plans for accessible classes.
      responses:
        "200":
          description: Lesson plan summaries.
        "401":
          description: Unauthenticated.
        "403":
          description: Missing lesson permission.
  /teacher/assessments:
    get:
      summary: List assessments for accessible classes.
      responses:
        "200":
          description: Assessment summaries.
        "401":
          description: Unauthenticated.
        "403":
          description: Missing assessment permission.
  /teacher/gradebooks:
    get:
      summary: List gradebook sheets for accessible assessments.
      responses:
        "200":
          description: Gradebook sheet summaries.
        "401":
          description: Unauthenticated.
        "403":
          description: Missing gradebook permission.
  /teacher/reports:
    get:
      summary: List report readiness for accessible classes.
      responses:
        "200":
          description: Report readiness summaries.
        "401":
          description: Unauthenticated.
        "403":
          description: Missing report permission.
  /teacher/approvals:
    get:
      summary: List approval requests visible to the current teacher or reviewer.
      responses:
        "200":
          description: Approval request summaries.
        "401":
          description: Unauthenticated.
        "403":
          description: Missing approval permission.
  /lesson-plans:
    post:
      summary: Create a lesson plan draft for an accessible class.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLessonPlanRequest"
      responses:
        "201":
          description: Created lesson plan.
        "400":
          description: Invalid lesson plan draft.
        "401":
          description: Unauthenticated.
        "403":
          description: Class is outside permitted scope or missing lesson permission.
  /assessments:
    post:
      summary: Create an assessment draft for an accessible class.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssessmentRequest"
      responses:
        "201":
          description: Created assessment.
        "400":
          description: Invalid assessment draft.
        "401":
          description: Unauthenticated.
        "403":
          description: Class is outside permitted scope or missing assessment permission.
  /classes/{classId}:
    get:
      summary: Get class overview if the user has access.
      parameters:
        - in: path
          name: classId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Class overview.
        "401":
          description: Unauthenticated.
        "403":
          description: Class is outside permitted scope.
        "404":
          description: Class not found in active tenant.
  /lesson-plans/{lessonPlanId}:
    get:
      summary: Get lesson plan detail if the user has access.
      parameters:
        - in: path
          name: lessonPlanId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lesson plan detail.
        "401":
          description: Unauthenticated.
        "403":
          description: Lesson plan is outside permitted class scope.
        "404":
          description: Lesson plan not found in active tenant.
  /assessments/{assessmentId}:
    get:
      summary: Get assessment detail if the user has access.
      parameters:
        - in: path
          name: assessmentId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Assessment detail.
        "401":
          description: Unauthenticated.
        "403":
          description: Assessment is outside permitted class scope.
        "404":
          description: Assessment not found in active tenant.
  /gradebooks/{assessmentId}:
    get:
      summary: Get gradebook sheet for an accessible assessment.
      parameters:
        - in: path
          name: assessmentId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Gradebook sheet detail.
        "401":
          description: Unauthenticated.
        "403":
          description: Gradebook sheet is outside permitted class scope.
        "404":
          description: Gradebook sheet not found in active tenant.
    post:
      summary: Save score rows for an accessible gradebook sheet.
      parameters:
        - in: path
          name: assessmentId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveGradebookScoresRequest"
      responses:
        "200":
          description: Updated gradebook sheet.
        "400":
          description: Invalid score rows.
        "401":
          description: Unauthenticated.
        "403":
          description: Gradebook sheet is outside permitted class scope or missing mark permission.
        "404":
          description: Gradebook sheet not found in active tenant.
  /reports/{classId}:
    get:
      summary: Get class report for an accessible class.
      parameters:
        - in: path
          name: classId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Class report detail.
        "401":
          description: Unauthenticated.
        "403":
          description: Class is outside permitted scope or missing report permission.
        "404":
          description: Report not found in active tenant.
    post:
      summary: Save report comments for an accessible class.
      parameters:
        - in: path
          name: classId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveReportCommentsRequest"
      responses:
        "200":
          description: Updated class report.
        "400":
          description: Invalid report comments.
        "401":
          description: Unauthenticated.
        "403":
          description: Class is outside permitted scope or missing report permission.
        "404":
          description: Report not found in active tenant.
  /approvals/{approvalId}:
    get:
      summary: Get approval request detail if the user has access.
      parameters:
        - in: path
          name: approvalId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approval request detail.
        "401":
          description: Unauthenticated.
        "403":
          description: Approval request is outside permitted scope.
        "404":
          description: Approval request not found in active tenant.
    post:
      summary: Submit an approval decision as a reviewer.
      parameters:
        - in: path
          name: approvalId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitApprovalDecisionRequest"
      responses:
        "200":
          description: Updated approval request.
        "400":
          description: Invalid approval decision.
        "401":
          description: Unauthenticated.
        "403":
          description: Approval request is outside permitted scope or missing reviewer permission.
        "404":
          description: Approval request not found in active tenant.
  /classes/{classId}/attendance:
    get:
      summary: Get attendance register for an accessible class.
      parameters:
        - in: path
          name: classId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Attendance register.
        "401":
          description: Unauthenticated.
        "403":
          description: Class is outside permitted scope or missing attendance permission.
        "404":
          description: Class not found in active tenant.
    post:
      summary: Save attendance records for an accessible class.
      parameters:
        - in: path
          name: classId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkAttendanceRequest"
      responses:
        "200":
          description: Updated attendance register.
        "400":
          description: Invalid attendance records.
        "401":
          description: Unauthenticated.
        "403":
          description: Class is outside permitted scope or missing attendance permission.
        "404":
          description: Class not found in active tenant.
